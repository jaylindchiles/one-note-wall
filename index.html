<!DOCTYPE html>
<html>
<head>
  <title>One Note Wall</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #b8864b; /* corkboard brown */
}

    h1 {
      text-align: center;
      padding: 20px;
    }

    #inputBox {
      display: flex;
      justify-content: center;
      padding: 20px;
      gap: 10px;
    }

    input {
      width: 250px;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    #board {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding-bottom: 100px;
    }

    .note {
  width: 260px;
  padding: 15px;
  background: #fff3a6;
  box-shadow: 0 8px 15px rgba(0,0,0,0.3);
  position: relative;
  transform: rotate(var(--rot));
  border-radius: 3px;
}

    .pin {
  width: 16px;
  height: 16px;
  background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
  border-radius: 50%;
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 3px 5px rgba(0,0,0,0.4);
}
  </style>
</head>
<body>

<h1>One Note Wall</h1>

<div id="inputBox">
  <input id="name" placeholder="Your name (optional)" />
  <input id="message" placeholder="Write your one note..." />
  <input id="song" placeholder="Spotify link (optional)" />

  <select id="color">
    <option value="#fff3a6">Yellow</option>
    <option value="#a6f3ff">Blue</option>
    <option value="#ffa6d1">Pink</option>
    <option value="#b7ffa6">Green</option>
  </select>

  <select id="mood">
    <option value="💬">Neutral</option>
    <option value="❤️">Love</option>
    <option value="😔">Sad</option>
    <option value="🔥">Angry</option>
    <option value="✨">Hope</option>
    <option value="🧠">Advice</option>
  </select>

  <button onclick="postNote()">Post</button>
</div>
  <button onclick="postNote()">Post</button>
  <button onclick="randomNote()">Random Note</button>
</div>

<div id="board"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  query, 
  orderBy 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAnQ5m6D1ZI3EDuj_64XToz88bWNtrrLMw",
  authDomain: "onenotewall.firebaseapp.com",
  projectId: "onenotewall",
  storageBucket: "onenotewall.firebasestorage.app",
  messagingSenderId: "448667720353",
  appId: "1:448667720353:web:4c85f30747184163bb2ee0",
  measurementId: "G-DH3D886SM3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const notesRef = collection(db, "notes");

// POST NOTE
window.postNote = async function () {
  const name = document.getElementById("name").value;
  const msg = document.getElementById("message").value;
  const song = document.getElementById("song").value;
  const color = document.getElementById("color").value;
  const mood = document.getElementById("mood").value;

  if (!msg) return;

  await addDoc(notesRef, {
    name: name || "Anonymous",
    message: msg,
    song: song,
    color: color,
    mood: mood,
    timestamp: Date.now()
  });

  document.getElementById("name").value = "";
  document.getElementById("message").value = "";
  document.getElementById("song").value = "";
};
window.randomNote = function () {
  const notes = document.querySelectorAll(".note");
  if (notes.length === 0) return;

  const randomIndex = Math.floor(Math.random() * notes.length);
  const selected = notes[randomIndex];

  selected.scrollIntoView({ behavior: "smooth", block: "center" });
  selected.style.transform = "scale(1.1)";
  setTimeout(() => {
    selected.style.transform = "";
  }, 600);
};
  function extractSpotifyID(url) {
  try {
    return url.split("track/")[1].split("?")[0];
  } catch {
    return "";
  }
}
// LIVE LOAD NOTES
const q = query(notesRef);

onSnapshot(q, (snapshot) => {
  const board = document.getElementById("board");
  board.innerHTML = "";

  snapshot.docs
    .sort((a, b) => b.data().timestamp - a.data().timestamp)
    .forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "note";
div.style.background = data.color || "#fff3a6";
div.style.setProperty("--rot", (Math.random() * 6 - 3) + "deg");
div.style.setProperty("--rot", (Math.random() * 6 - 3) + "deg");
      div.innerHTML = `
  <div class="pin"></div>
  <div style="font-size:12px; opacity:0.7;">
    ${data.mood} ${data.name}
  </div>
  <div>${data.message}</div>
  ${data.song ? `
    <iframe 
      style="border-radius:12px; margin-top:10px;"
      src="https://open.spotify.com/embed/track/${extractSpotifyID(data.song)}"
      width="100%" 
      height="80">
    </iframe>
  ` : ""}
`;

      board.appendChild(div);
    });
});
</script>

</body>
</html>
