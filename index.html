<!DOCTYPE html>
<html>
<head>
  <title>One Note Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #b8864b;
    }

    h1 {
      text-align: center;
      padding: 10px;
    }

    #topbar, #controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 10px;
    }

    input, select, button {
      padding: 8px;
      font-size: 13px;
    }

    #board {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding-bottom: 80px;
    }

    .note {
      width: 290px;
      padding: 14px;
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
      position: relative;

      /* ✅ FIX: sticky note tilt restored */
      transform: rotate(var(--tilt, 0deg));
      transition: transform 0.2s ease;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      opacity: 0.75;
    }

    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .pin {
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      background: radial-gradient(circle, #ff4d4d, #900);
      border-radius: 50%;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .emoji-picker {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .emoji-picker span {
      cursor: pointer;
      font-size: 16px;
    }

    .reply {
      font-size: 12px;
      margin-left: 10px;
      border-left: 2px solid #999;
      padding-left: 6px;
      margin-top: 4px;
    }

    .reaction-count {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<h1>One Note Wall</h1>

<div id="topbar">
  <button onclick="setPage('explore')">🌍 Explore</button>
  <button onclick="setPage('trending')">🔥 Trending</button>
  <button onclick="setPage('profile')">🧑 Profile</button>
</div>

<div id="controls">
  <input id="message" placeholder="Write a note..." />
  <input id="song" placeholder="Spotify link (optional)" />

  <!-- ✅ FIX: color now properly saved & used -->
  <select id="color">
    <option value="#fff3a6">Yellow</option>
    <option value="#a6f3ff">Blue</option>
    <option value="#ffa6d1">Pink</option>
    <option value="#b7ffa6">Green</option>
  </select>

  <select id="mood">
    <option value="💬">Neutral</option>
    <option value="❤️">Love</option>
    <option value="😔">Sad</option>
    <option value="🔥">Angry</option>
    <option value="✨">Hope</option>
    <option value="🧠">Advice</option>
  </select>

  <button onclick="postNote()">Post</button>
</div>

<div id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnQ5m6D1ZI3EDuj_64XToz88bWNtrrLMw",
  authDomain: "onenotewall.firebaseapp.com",
  projectId: "onenotewall",
  storageBucket: "onenotewall.firebasestorage.app",
  messagingSenderId: "448667720353",
  appId: "1:448667720353:web:4c85f30747184163bb2ee0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const notesRef = collection(db, "notes");

let allNotes = [];
let page = "explore";

/* USER */
let user = localStorage.getItem("user");
if (!user) {
  user = prompt("Username") || "Anonymous";
  localStorage.setItem("user", user);
}

/* PAGE */
window.setPage = (p) => {
  page = p;
  render();
};

/* POST */
window.postNote = async function () {
  const msg = document.getElementById("message").value;
  if (!msg) return;

  await addDoc(notesRef, {
    name: user,
    message: msg,
    song: document.getElementById("song").value,
    color: document.getElementById("color").value, // ✅ FIXED
    mood: document.getElementById("mood").value,
    reactions: {},
    replies: [],
    timestamp: Date.now()
  });

  document.getElementById("message").value = "";
  document.getElementById("song").value = "";
};

/* SPOTIFY */
function extractSpotifyID(url){
  try { return url.split("track/")[1].split("?")[0]; }
  catch { return ""; }
}

/* EMOJIS */
const emojis = ["❤️","😂","😭","🔥","👍","👏","😡","😱","💀","✨","🥺","😔","😴","🤯","💯","😎","🤍","💔","🙏","🎧"];

window.react = async (id, e) => {
  const ref = doc(db,"notes",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const r = data.reactions || {};
  r[e] = (r[e] || 0) + 1;

  await updateDoc(ref,{reactions:r});
};

window.toggleEmoji = (id) => {
  const el = document.getElementById("emoji-"+id);
  el.style.display = el.style.display === "flex" ? "none" : "flex";
};

/* REPLY */
window.reply = async (id) => {
  const text = prompt("Reply:");
  if (!text) return;

  const ref = doc(db,"notes",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const rep = data.replies || [];
  rep.push({user,text,time:Date.now()});

  await updateDoc(ref,{replies:rep});
};

/* RENDER */
function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  let list = [...allNotes];

  if(page==="profile") list = list.filter(n=>n.name===user);

  if(page==="trending"){
    list.sort((a,b)=>{
      const ar = Object.values(a.reactions||{}).reduce((x,y)=>x+y,0);
      const br = Object.values(b.reactions||{}).reduce((x,y)=>x+y,0);
      return br-ar;
    });
  } else {
    list.sort((a,b)=>b.timestamp-a.timestamp);
  }

  list.forEach(n=>{
    const div = document.createElement("div");
    div.className="note";

    const initial = (n.name||"A")[0].toUpperCase();

    /* ✅ FIX: color ALWAYS comes from Firestore */
    div.style.background = n.color || "#fff3a6";

    /* ✅ FIX: sticky note tilt restored */
    div.style.setProperty("--tilt", (Math.random()*6 - 3) + "deg");

    const totalReactions = Object.values(n.reactions||{}).reduce((a,b)=>a+b,0);

    div.innerHTML = `
      <div class="pin"></div>

      <div class="meta">
        <div class="avatar">${initial}</div>
        ${n.mood} ${n.name}
      </div>

      <div>${n.message}</div>

      ${n.song ? `
        <iframe width="100%" height="80"
          src="https://open.spotify.com/embed/track/${extractSpotifyID(n.song)}">
        </iframe>
      ` : ""}

      <!-- ✅ FIX: reaction counter restored -->
      <div class="reaction-count">❤️ ${totalReactions} reactions</div>

      <div class="actions">
        <button onclick="reply('${n.id}')">💬 Reply</button>
        <button onclick="toggleEmoji('${n.id}')">😊 React</button>
      </div>

      <div id="emoji-${n.id}" class="emoji-picker">
        ${emojis.map(e=>`<span onclick="react('${n.id}','${e}')">${e}</span>`).join("")}
      </div>

      <div>
        ${(n.replies||[]).map(r=>`
          <div class="reply"><b>${r.user}:</b> ${r.text}</div>
        `).join("")}
      </div>
    `;

    board.appendChild(div);
  });
}

/* LIVE */
onSnapshot(notesRef,(snap)=>{
  allNotes = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

</script>

</body>
</html>
