<!DOCTYPE html>
<html>
<head>
  <title>One Note Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #b8864b;
    }

    h1 {
      text-align: center;
      padding: 10px;
    }

    #topbar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      flex-wrap: wrap;
    }

    input, select, button {
      padding: 8px;
      font-size: 13px;
    }

    #board {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding-bottom: 80px;
    }

    .note {
      width: 280px;
      padding: 15px;
      background: #fff3a6;
      border-radius: 6px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    }

    .meta {
      display: flex;
      align-items: center;
      font-size: 12px;
      opacity: 0.7;
      gap: 6px;
      margin-bottom: 6px;
    }

    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .reactions span {
      cursor: pointer;
      margin-right: 5px;
      font-size: 12px;
    }

    .reply {
      font-size: 12px;
      margin-left: 10px;
      border-left: 2px solid #999;
      padding-left: 6px;
    }
  </style>
</head>

<body>

<h1>One Note Wall</h1>

<!-- TOP BAR -->
<div id="topbar">
  <button onclick="setPage('explore')">🌍 Explore</button>
  <button onclick="setPage('trending')">🔥 Trending</button>
  <button onclick="setPage('profile')">🧑 Profile</button>
  <button onclick="enableNotifications()">🔔 Notifications</button>
</div>

<!-- INPUT -->
<div id="topbar">
  <input id="message" placeholder="Write note..." />
  <input id="song" placeholder="Spotify link" />

  <select id="color">
    <option value="#fff3a6">Yellow</option>
    <option value="#a6f3ff">Blue</option>
    <option value="#ffa6d1">Pink</option>
    <option value="#b7ffa6">Green</option>
  </select>

  <select id="mood">
    <option value="💬">Neutral</option>
    <option value="❤️">Love</option>
    <option value="😔">Sad</option>
    <option value="🔥">Angry</option>
    <option value="✨">Hope</option>
    <option value="🧠">Advice</option>
  </select>

  <button onclick="postNote()">Post</button>
</div>

<div id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnQ5m6D1ZI3EDuj_64XToz88bWNtrrLMw",
  authDomain: "onenotewall.firebaseapp.com",
  projectId: "onenotewall",
  storageBucket: "onenotewall.firebasestorage.app",
  messagingSenderId: "448667720353",
  appId: "1:448667720353:web:4c85f30747184163bb2ee0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const notesRef = collection(db, "notes");

let allNotes = [];
let page = "explore";

/* ---------------- PROFILE ---------------- */
let user = localStorage.getItem("user");
if (!user) {
  user = prompt("Enter username") || "Anonymous";
  localStorage.setItem("user", user);
}

/* ---------------- PAGE SWITCH ---------------- */
window.setPage = (p) => {
  page = p;
  render();
};

/* ---------------- NOTIFICATIONS (BASIC) ---------------- */
window.enableNotifications = async function () {
  if (!("Notification" in window)) return;
  await Notification.requestPermission();
  alert("Notifications enabled (base only)");
};

/* ---------------- POST ---------------- */
window.postNote = async function () {
  const msg = document.getElementById("message").value;
  if (!msg) return;

  await addDoc(notesRef, {
    name: user,
    message: msg,
    song: document.getElementById("song").value,
    color: document.getElementById("color").value,
    mood: document.getElementById("mood").value,
    reactions: {},
    replies: [],
    timestamp: Date.now()
  });

  document.getElementById("message").value = "";
  document.getElementById("song").value = "";
};

/* ---------------- REACTIONS ---------------- */
const reactionList = [
  "❤️","😂","😭","🔥","👍","👏","😡","😱","💀","✨",
  "🥺","😔","😴","🤯","💯","😎","🤍","💔","🙏","🎧"
];

window.react = async function (id, emoji) {
  const ref = doc(db, "notes", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const r = data.reactions || {};
  r[emoji] = (r[emoji] || 0) + 1;

  await updateDoc(ref, { reactions: r });
};

/* ---------------- REPLY ---------------- */
window.reply = async function (id) {
  const text = prompt("Reply:");
  if (!text) return;

  const ref = doc(db, "notes", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const replies = data.replies || [];
  replies.push({ user, text, time: Date.now() });

  await updateDoc(ref, { replies });
};

/* ---------------- SPOTIFY ---------------- */
function extractSpotifyID(url) {
  try {
    return url.split("track/")[1].split("?")[0];
  } catch {
    return "";
  }
}

/* ---------------- RENDER ---------------- */
function render() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  let list = [...allNotes];

  if (page === "profile") {
    list = list.filter(n => n.name === user);
  }

  if (page === "trending") {
    list.sort((a, b) => {
      const ar = Object.values(a.reactions || {}).reduce((x, y) => x + y, 0);
      const br = Object.values(b.reactions || {}).reduce((x, y) => x + y, 0);
      return br - ar;
    });
  }

  if (page === "explore") {
    list.sort((a, b) => b.timestamp - a.timestamp);
  }

  list.forEach(n => {
    const div = document.createElement("div");
    div.className = "note";

    const initial = (n.name || "A")[0].toUpperCase();

    div.innerHTML = `
      <div class="meta">
        <div class="avatar">${initial}</div>
        ${n.mood} ${n.name}
      </div>

      <div>${n.message}</div>

      ${n.song ? `
        <iframe width="100%" height="80"
          style="margin-top:8px;border-radius:8px"
          src="https://open.spotify.com/embed/track/${extractSpotifyID(n.song)}">
        </iframe>
      ` : ""}

      <button onclick="reply('${n.id}')">💬 Reply</button>

      <div>
        ${(n.replies || []).map(r =>
          `<div class="reply">💬 <b>${r.user}</b>: ${r.text}</div>`
        ).join("")}
      </div>

      <div class="reactions">
        ${reactionList.map(r =>
          `<span onclick="react('${n.id}','${r}')">${r} ${(n.reactions||{})[r]||0}</span>`
        ).join("")}
      </div>
    `;

    board.appendChild(div);
  });
}

/* ---------------- LIVE ---------------- */
onSnapshot(notesRef, (snap) => {
  allNotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});

</script>

</body>
</html>
