<!DOCTYPE html>
<html>
<head>
  <title>On The Wall (OTW)</title>

  <style>
   body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-image:
    linear-gradient(
      rgba(0,0,0,.12),
      rgba(0,0,0,.12)
    ),
    url("https://wallpapers.com/images/hd/cork-board-background-2000-x-1328-0z2f3nkzu8w4q19a.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image:
    repeating-radial-gradient(
      circle,
      rgba(255,255,255,.015) 0px,
      rgba(255,255,255,.015) 1px,
      transparent 2px,
      transparent 4px
    );

  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;

  background:
    radial-gradient(
      circle,
      transparent 40%,
      rgba(0,0,0,.30) 100%
    );

  pointer-events: none;
}

h1 {
  text-align: center;
  margin: 10px 0 0;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,.5);
}

.sub {
  text-align: center;
  color: white;
  opacity: .9;
  margin-bottom: 10px;
}

#topbar,
#controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  position: relative;
  z-index: 1;
}

input,
select,
button {
  padding: 8px;
  font-size: 13px;
  border-radius: 8px;
  border: none;
}

#board {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding-bottom: 80px;
  position: relative;
  z-index: 1;
}

.note {
  width: 300px;
  padding: 14px;
  border-radius: 6px;
  box-shadow: 0 8px 18px rgba(0,0,0,.35);
  position: relative;
  transform: rotate(var(--tilt));
  transition: .2s;
}

.note:hover {
  transform: rotate(var(--tilt)) scale(1.02);
}

.pin {
  position: absolute;
  top: -7px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 14px;
  background: radial-gradient(circle,#ff4d4d,#900);
  border-radius: 50%;
}

.meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  opacity: .75;
}

.avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #333;
  color: white;

  display: flex;
  align-items: center;
  justify-content: center;
}

.actions {
  margin-top: 8px;
}

.reactionBar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.reactionChip {
  background: rgba(255,255,255,.5);
  padding: 4px 8px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
}

.emoji-picker {
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.emoji-picker span {
  cursor: pointer;
  font-size: 16px;
}

.reply {
  font-size: 12px;
  margin-top: 5px;
  margin-left: 10px;
  padding-left: 6px;
  border-left: 2px solid #999;
}

.profileCard {
  width: 320px;

  background: rgba(255,255,255,.92);

  border-radius: 16px;

  padding: 20px;

  text-align: center;

  margin-bottom: 15px;

  box-shadow:
    0 10px 25px rgba(0,0,0,.25);
}

.profileAvatar {
  width: 70px;
  height: 70px;

  border-radius: 50%;

  background: #333;
  color: white;

  display: flex;
  align-items: center;
  justify-content: center;

  margin: auto;

  font-size: 30px;
}

.count {
  font-size: 12px;
  opacity: .7;
  margin-top: 6px;
}
  </style>
</head>

<body>

<h1>On The Wall</h1>
<div class="sub">OTW — leave a note, leave a moment</div>

<div id="topbar">
  <button onclick="setPage('explore')">🌍 Explore</button>
  <button onclick="setPage('trending')">🔥 Trending</button>
  <button onclick="setPage('profile')">🧑 Profile</button>
</div>

<div id="controls">
  <input id="message" placeholder="Write a note..." />
  <input id="song" placeholder="Spotify link (optional)" />
  <input id="search" placeholder="Search notes..." oninput="render()" />

  <select id="mood">
    <option value="💬">Neutral</option>
    <option value="❤️">Love</option>
    <option value="😔">Sad</option>
    <option value="🔥">Angry</option>
    <option value="✨">Hope</option>
    <option value="🧠">Advice</option>
  </select>

  <button onclick="postNote()">Post</button>
</div>

<div id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnQ5m6D1ZI3EDuj_64XToz88bWNtrrLMw",
  authDomain: "onenotewall.firebaseapp.com",
  projectId: "onenotewall",
  storageBucket: "onenotewall.firebasestorage.app",
  messagingSenderId: "448667720353",
  appId: "1:448667720353:web:4c85f30747184163bb2ee0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const notesRef = collection(db, "notes");

let allNotes = [];
let page = "explore";

/* USER */
let user = localStorage.getItem("otw_user");

if (!user) {
  const entered =
    prompt("Choose your OTW username") || "anonymous";

  user = entered.trim().toLowerCase();

  localStorage.setItem("otw_user", user);
}

/* NAV */
window.setPage = (p) => {
  page = p;
  render();
};

/* POST */
  const moodColors = {
  "💬": "#fff3a6",
  "❤️": "#ffa6d1",
  "😔": "#a6f3ff",
  "🔥": "#ffb3a6",
  "✨": "#b7ffa6",
  "🧠": "#d9b3ff"
};
  
window.postNote = async function () {
  const msg = document.getElementById("message").value;
  if (!msg) return;

  const mood =
  document.getElementById("mood").value;

await addDoc(notesRef, {
  name: user,
  message: msg,
  song: document.getElementById("song").value,
  mood: mood,
  color: moodColors[mood],
    reactions: {},
    replies: [],
    pinned: false,
    timestamp: Date.now()
  });

  document.getElementById("message").value = "";
  document.getElementById("song").value = "";
};

/* SPOTIFY */
function extractSpotifyID(url){
  try { return url.split("track/")[1].split("?")[0]; }
  catch { return ""; }
}

/* EMOJIS */
const emojis = [
  "❤️","😂","😭","🔥","👍","👏","😡","😱","💀","✨",
  "🥺","😔","😴","🤯","💯","😎","🤍","💔","🙏","🎧"
];

window.react = async (id, e) => {
  const ref = doc(db,"notes",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const r = data.reactions || {};
  r[e] = (r[e] || 0) + 1;

  await updateDoc(ref,{reactions:r});
};

window.toggleEmoji = (id) => {
  const el = document.getElementById("emoji-" + id);
  if (!el) return;

  el.style.display =
    el.style.display === "flex" ? "none" : "flex";
};

window.reply = async (id) => {
  const text = prompt("Write reply:");
  if (!text) return;

  const ref = doc(db,"notes",id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const rep = data.replies || [];
  rep.push({user,text,time:Date.now()});

  await updateDoc(ref,{replies:rep});
};

/* SCORE */
function score(n){
  const r = Object.values(n.reactions||{}).reduce((a,b)=>a+b,0);
  const rep = (n.replies||[]).length;
  return r*2 + rep*3 + (n.pinned?50:0);
}

/* RENDER */
  function getUserStats(username){

  const posts =
    allNotes.filter(n => n.name === username);

  const postCount = posts.length;

  const reactionCount =
    posts.reduce((sum,n)=>{
      return sum +
      Object.values(n.reactions || {})
      .reduce((a,b)=>a+b,0);
    },0);

  const replyCount =
    posts.reduce((sum,n)=>{
      return sum +
      (n.replies || []).length;
    },0);

  return {
    postCount,
    reactionCount,
    replyCount
  };
}
  
function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  if(page === "profile"){

  const stats = getUserStats(user);

  board.innerHTML += `
    <div class="profileCard">

      <div class="profileAvatar">
        ${user[0].toUpperCase()}
      </div>

      <h2>
  ${user.charAt(0).toUpperCase() + user.slice(1)}
</h2>

      <p>📝 ${stats.postCount} Posts</p>

      <p>❤️ ${stats.reactionCount} Reactions</p>

      <p>💬 ${stats.replyCount} Replies</p>

    </div>
  `;
}

  let search = document.getElementById("search").value.toLowerCase();

  let list = allNotes.filter(n =>
    n.message.toLowerCase().includes(search) ||
    n.name.toLowerCase().includes(search)
  );

  if(page === "profile") list = list.filter(n => n.name === user);

  if(page === "trending"){
    list.sort((a,b)=>score(b)-score(a));
  } else {
    list.sort((a,b)=>b.timestamp-a.timestamp);
  }

  list.forEach(n=>{
    const div = document.createElement("div");
    div.className="note";

    div.style.background =
  n.color ||
  moodColors[n.mood] ||
  "#fff3a6";
    div.style.setProperty("--tilt",(Math.random()*6-3)+"deg");

    const total = Object.values(n.reactions||{}).reduce((a,b)=>a+b,0);
    const initial = (n.name||"A")[0].toUpperCase();

    div.innerHTML = `
      <div class="pin"></div>

      <div class="meta">
        <div class="avatar" onclick="setPage('profile')">
  ${initial}
</div>>
        ${n.mood} ${n.name}
      </div>

      <div>${n.message}</div>

      ${n.song ? `
        <div style="margin-top:8px;">
  🎧 <a href="${n.song}" target="_blank">Open Song</a>
</div>
      ` : ""}

      <div class="count">❤️ ${total} reactions · 💬 ${(n.replies||[]).length} replies</div>

     <div class="actions">

  <div class="reactionBar">

    <span class="reactionChip" onclick="react('${n.id}','❤️')">
      ❤️ ${n.reactions?.["❤️"] || 0}
    </span>

    <span class="reactionChip" onclick="react('${n.id}','😂')">
      😂 ${n.reactions?.["😂"] || 0}
    </span>

    <span class="reactionChip" onclick="react('${n.id}','🔥')">
      🔥 ${n.reactions?.["🔥"] || 0}
    </span>

    <span class="reactionChip" onclick="react('${n.id}','✨')">
      ✨ ${n.reactions?.["✨"] || 0}
    </span>

    <span class="reactionChip" onclick="react('${n.id}','💀')">
      💀 ${n.reactions?.["💀"] || 0}
    </span>

    <button onclick="toggleEmoji('${n.id}')">➕</button>

  </div>

  <button onclick="reply('${n.id}')">💬 Reply</button>

</div>

     <div id="emoji-${n.id}" class="emoji-picker">
  ${emojis.map(e =>
    `<span onclick="react('${n.id}','${e}')">${e}</span>`
  ).join("")}
</div>

      ${(n.replies||[]).map(r=>`
        <div class="reply"><b>${r.user}:</b> ${r.text}</div>
      `).join("")}
    `;

    board.appendChild(div);
  });
}

/* LIVE */
onSnapshot(notesRef,(snap)=>{
  allNotes = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

</script>

</body>
</html>
