<!DOCTYPE html>
<html>
<head>
  <title>One Note Wall</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2e7c9;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    #inputBox {
      display: flex;
      justify-content: center;
      padding: 20px;
      gap: 10px;
    }

    input {
      width: 250px;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    #board {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding-bottom: 100px;
    }

    .note {
      width: 260px;
      padding: 15px;
      background: #fff176;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
      position: relative;
      transform: rotate(-1deg);
    }

    .pin {
      width: 12px;
      height: 12px;
      background: red;
      border-radius: 50%;
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

<h1>One Note Wall</h1>

<div id="inputBox">
  <input id="message" placeholder="Write your one note..." />
<input id="song" placeholder="Paste Spotify link (optional)" />
  <button onclick="postNote()">Post</button>
</div>

<div id="board"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  query, 
  orderBy 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAnQ5m6D1ZI3EDuj_64XToz88bWNtrrLMw",
  authDomain: "onenotewall.firebaseapp.com",
  projectId: "onenotewall",
  storageBucket: "onenotewall.firebasestorage.app",
  messagingSenderId: "448667720353",
  appId: "1:448667720353:web:4c85f30747184163bb2ee0",
  measurementId: "G-DH3D886SM3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const notesRef = collection(db, "notes");

// POST NOTE
window.postNote = async function () {
  const msg = document.getElementById("message").value;
  const song = document.getElementById("song").value;

  if (!msg) return;

  await addDoc(notesRef, {
    message: msg,
    song: song,
    timestamp: Date.now()
  });

  document.getElementById("message").value = "";
  document.getElementById("song").value = "";
};

// LIVE LOAD NOTES
const q = query(notesRef);

onSnapshot(q, (snapshot) => {
  const board = document.getElementById("board");
  board.innerHTML = "";

  snapshot.docs
    .sort((a, b) => b.data().timestamp - a.data().timestamp)
    .forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "note";
      div.innerHTML = `
  <div class="pin"></div>
  <div>${data.message}</div>
  ${data.song ? `<a href="${data.song}" target="_blank">▶ Spotify Song</a>` : ""}
`;

      board.appendChild(div);
    });
});
</script>

</body>
</html>
